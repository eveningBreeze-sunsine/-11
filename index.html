<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食光小助 - 校园食堂助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        #app {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            position: relative;
        }
        .header small {
            font-size: 0.7rem;
            opacity: 0.9;
            display: block;
            margin-top: 4px;
        }
        .preference-card {
            background: #f9f9f9;
            margin: 12px;
            padding: 12px;
            border-radius: 16px;
            border-left: 4px solid #43a047;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .preference-card span {
            font-weight: bold;
            color: #333;
        }
        .preference-card button {
            background: #e0e0e0;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background-color: #fff;
        }
        .message {
            margin-bottom: 12px;
            display: flex;
        }
        .user-message {
            justify-content: flex-end;
        }
        .bot-message {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }
        .user-message .bubble {
            background-color: #43a047;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot-message .bubble {
            background-color: #e5e5ea;
            color: #000;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #eee;
            gap: 8px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 30px;
            outline: none;
            font-size: 14px;
        }
        .input-area button {
            background-color: #43a047;
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            height: 44px;
        }
        .input-area .add-btn {
            background-color: #e0e0e0;
            color: #333;
            padding: 0 16px;
            font-size: 18px;
        }
        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 12px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }
        .quick-btn {
            background: #e0e0e0;
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }
        #image-file-input {
            display: none;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        🍚 食光小助
        <small>广州城市理工学院 · 食堂助手</small>
    </div>

    <!-- 用户偏好卡片 -->
    <div class="preference-card" id="pref-card">
        <div><span>口味：</span> <span id="pref-taste">正常</span>   |  <span>健康目标：</span> <span id="pref-goal">保持健康</span>   |  <span>忌口：</span> <span id="pref-allergies">无</span></div>
        <button onclick="showPrefDialog()">修改</button>
    </div>

    <!-- 聊天记录区域 -->
    <div class="chat-messages" id="chat-messages"></div>

    <!-- 快捷回复 -->
    <div class="quick-buttons">
        <button class="quick-btn" onclick="sendQuick('推荐吃的')">🍽️ 推荐吃的</button>
        <button class="quick-btn" onclick="sendQuick('我想吃辣的')">🌶️ 辣味推荐</button>
        <button class="quick-btn" onclick="sendQuick('减肥吃什么')">⚖️ 减肥推荐</button>
        <button class="quick-btn" onclick="sendQuick('西红柿炒蛋')">🍅 西红柿炒蛋</button>
        <button class="quick-btn" onclick="sendQuick('我的偏好')">📋 我的偏好</button>
    </div>

    <!-- 输入区：添加按钮 + 输入框 + 发送按钮 -->
    <div class="input-area">
        <button class="add-btn" id="add-image-btn">+</button>
        <input type="text" id="chat-input" placeholder="输入消息..." autocomplete="off">
        <button id="send-btn">发送</button>
    </div>
    <!-- 隐藏的文件上传控件 -->
    <input type="file" id="image-file-input" accept="image/*" style="display:none;">
</div>

<script>
    // ========== 配置区域（请替换为您的实际信息）==========
    const CONFIG = {
        // 扣子 Bot API
        BOT_API_KEY: 'pat_0tjQiAkRYKQTaaNZxuYm5107fHvgWZbZFthfChbW4b2S9CwCuc41h8ZuifLqvZUy',                // 扣子 Bot API Key
        BOT_ID: '7613641806085177396',                     // 扣子 Bot ID
        BOT_API_URL:'https://api.coze.cn/open_api/v2/chat',

        // 图片识别工作流
        WORKFLOW_IMAGE_ID: '7620407464383987722',
        WORKFLOW_API_URL: 'https://api.coze.cn/v1/workflow/run',

        // 知识库配置（火山引擎）
        KNOWLEDGE_ACCOUNT_ID: '2108708995',
        KNOWLEDGE_API_KEY: '6fd67fb0-fe35-4807-9cab-3c805d5fe9eb',
        KNOWLEDGE_SERVICE_RESOURCE_ID: 'kb-service-536cd41d7d763490',
        KNOWLEDGE_API_URL: 'https://api-knowledgebase.mlp.cn-beijing.volces.com/api/knowledge/service/chat',
    };

    // 用户偏好
    let userPref = {
        taste: localStorage.getItem('pref_taste') || '正常',
        healthGoal: localStorage.getItem('pref_healthGoal') || '保持健康',
        allergies: localStorage.getItem('pref_allergies') || '无'
    };

    function updatePrefDisplay() {
        document.getElementById('pref-taste').innerText = userPref.taste;
        document.getElementById('pref-goal').innerText = userPref.healthGoal;
        document.getElementById('pref-allergies').innerText = userPref.allergies;
    }
    updatePrefDisplay();

    function savePref(taste, healthGoal, allergies) {
        userPref = { taste, healthGoal, allergies };
        localStorage.setItem('pref_taste', taste);
        localStorage.setItem('pref_healthGoal', healthGoal);
        localStorage.setItem('pref_allergies', allergies);
        updatePrefDisplay();
    }

    function showPrefDialog() {
        const taste = prompt("请输入口味偏好（辣/清淡/正常）：", userPref.taste);
        const goal = prompt("请输入健康目标（减重/增肌/保持健康）：", userPref.healthGoal);
        const allergies = prompt("请输入忌口（多个用逗号分隔）：", userPref.allergies);
        if (taste !== null && goal !== null && allergies !== null) {
            savePref(taste, goal, allergies);
            sendMessage(`我的偏好是口味=${taste}, 健康目标=${goal}, 忌口=${allergies}`);
        }
    }

    function addMessage(text, sender) {
        const container = document.getElementById('chat-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + (sender === 'user' ? 'user-message' : 'bot-message');
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = text.replace(/\n/g, '<br>');
        msgDiv.appendChild(bubble);
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    // 扣子 Bot 对话
    async function sendToBot(userMessage) {
        const fullMessage = `当前用户偏好：口味=${userPref.taste}，健康目标=${userPref.healthGoal}，忌口=${userPref.allergies || '无'}。\n用户问题：${userMessage}`;
        const payload = {
            bot_id: CONFIG.BOT_ID,
            user_id: 'user_' + (localStorage.getItem('user_id') || 'default'),
            additional_messages: [{"role": "user", "content": fullMessage}],
            auto_save: true,
            stream: false
        };
        try {
            const response = await fetch(CONFIG.BOT_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${CONFIG.BOT_API_KEY}`
                },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.code !== 0) return `Bot调用失败：${data.msg}`;
            const assistantMsg = data.messages.find(m => m.role === 'assistant');
            return assistantMsg ? assistantMsg.content : '未收到回复';
        } catch (error) {
            console.error(error);
            return '网络错误，请稍后重试';
        }
    }

    async function sendMessage(text) {
        if (!text.trim()) return;
        addMessage(text, 'user');
        const loadingMsg = addLoadingMessage();
        const reply = await sendToBot(text);
        removeLoadingMessage(loadingMsg);
        addMessage(reply, 'bot');
    }

    function sendQuick(text) {
        sendMessage(text);
    }

    // 图片识别
    async function recognizeImage(imageData) {
        const payload = {
            workflow_id: CONFIG.WORKFLOW_IMAGE_ID,
            parameters: { image: imageData }
        };
        try {
            const response = await fetch(CONFIG.WORKFLOW_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${CONFIG.BOT_API_KEY}`
                },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.code === 0) return data.data.output;
            else return `识别失败：${data.msg}`;
        } catch (error) {
            console.error(error);
            return '网络错误，请稍后重试';
        }
    }

    async function handleImageFile(file) {
        if (!file) return;
        addMessage('上传图片中...', 'user');
        const reader = new FileReader();
        reader.onload = async (event) => {
            const result = await recognizeImage(event.target.result);
            addMessage(result, 'bot');
        };
        reader.readAsDataURL(file);
    }

    async function handleImageUrl(url) {
        if (!url.trim()) return;
        addMessage(`上传图片URL: ${url}`, 'user');
        const result = await recognizeImage(url);
        addMessage(result, 'bot');
    }

    // 弹出图片上传选择
    function showImageUploadOptions() {
        const choice = confirm("点击“确定”上传本地图片，点击“取消”输入图片URL");
        if (choice) {
            document.getElementById('image-file-input').click();
        } else {
            const url = prompt("请输入图片URL（可访问的图片地址）：");
            if (url) handleImageUrl(url);
        }
    }

    // 辅助：加载提示
    let loadingDiv = null;
    function addLoadingMessage() {
        const container = document.getElementById('chat-messages');
        loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = '🤔 正在思考...';
        loadingDiv.appendChild(bubble);
        container.appendChild(loadingDiv);
        container.scrollTop = container.scrollHeight;
        return loadingDiv;
    }
    function removeLoadingMessage(loadingDiv) {
        if (loadingDiv && loadingDiv.parentNode) loadingDiv.parentNode.removeChild(loadingDiv);
    }

    // 事件绑定
    document.getElementById('send-btn').addEventListener('click', () => {
        const input = document.getElementById('chat-input');
        sendMessage(input.value);
        input.value = '';
    });
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const input = e.target;
            sendMessage(input.value);
            input.value = '';
        }
    });

    document.getElementById('add-image-btn').addEventListener('click', showImageUploadOptions);
    document.getElementById('image-file-input').addEventListener('change', (e) => {
        if (e.target.files.length) {
            handleImageFile(e.target.files[0]);
            e.target.value = '';
        }
    });

    // 初始化（不再加载食堂菜单）
    addMessage('你好！我是食堂助手“食光小助”🍚。我可以：\n🔍 查询菜品的营养信息（例如“西红柿炒蛋”）\n🌶️ 根据你的口味推荐菜品（例如“推荐辣的菜”）\n📷 上传图片识别菜品（点击“+”按钮）\n试试下面的快捷提问吧～', 'bot');
</script>
</body>
</html>
